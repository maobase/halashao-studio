  <main id="main">

    <header class="page-hero">
      <p class="page-kicker">REEL SYSTEM</p>
      <h1 class="page-title">片源台<br /><em class="gold">带声开干</em></h1>
      <p class="page-lead">自定义播放器。点下面片段可切换。欧了。</p>
    </header>
    <section class="reel-layout">
      <div class="player" id="player">
        <div class="player-stage">
          <video id="reelVid" class="player-vid" playsinline preload="metadata" poster="assets/showreel-poster.jpg">
            <source src="assets/showreel.mp4" type="video/mp4" />
          </video>
          <button type="button" class="player-big" id="playerBig" aria-label="播放"><span></span></button>
          <div class="player-scan" aria-hidden="true"></div>
        </div>
        <div class="player-bar">
          <button type="button" class="player-toggle" id="playerToggle" aria-label="播放/暂停">▶</button>
          <div class="player-scrub" id="playerScrub" role="slider" tabindex="0" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="player-scrub-fill" id="playerFill"></div>
          </div>
          <span class="player-time" id="playerTime">0:00 / 0:00</span>
          <button type="button" class="player-mute" id="playerMute" aria-label="静音">🔊</button>
        </div>
        <div class="player-meta">
          <span>SHOWREEL · 2026</span>
          <span id="clipName">主片源</span>
        </div>
      </div>
      <div class="reel-clips" id="clips">
        <button type="button" class="clip-card is-on" data-src="assets/showreel.mp4" data-name="主片源 · 旁白版">
          <img src="assets/showreel-poster.jpg" alt="" />
          <p>主片源 · 旁白</p>
        </button>
        <button type="button" class="clip-card" data-src="assets/hero-cinematic.mp4" data-name="电影镜头 · 循环">
          <img src="assets/hero-still.jpg" alt="" />
          <p>电影镜头</p>
        </button>
        <button type="button" class="clip-card" data-src="assets/showreel-motion.mp4" data-name="粒子漩涡 · 纯视觉">
          <img src="assets/work-motion.jpg" alt="" />
          <p>粒子漩涡</p>
        </button>
      </div>
    </section>
  
  </main>
