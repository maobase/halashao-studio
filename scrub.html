  <main id="main" class="page">
    <p class="kicker">SCRUB · TIMELINE</p>
    <h1 class="page-h">片源时间轴<br /><em class="seal">拖一下</em></h1>
    <p class="lead reveal">拖动进度条切硬话字幕节点。片源系统再加一层——时间轴上的气氛组。</p>

    <div class="scrub-player" id="scrubPlayer">
      <div class="scrub-stage">
        <video id="scrubVid" playsinline preload="metadata" poster="assets/showreel-poster.jpg">
          <source src="assets/showreel.mp4" type="video/mp4" />
        </video>
        <div class="scrub-cap" id="scrubCap">小树不倒我就不倒</div>
      </div>
      <div class="scrub-bar-wrap">
        <input type="range" id="scrubRange" min="0" max="1000" value="0" />
        <div class="scrub-marks" id="scrubMarks"></div>
      </div>
      <div class="scrub-meta">
        <button type="button" class="btn btn-led" id="scrubPlay">▶</button>
        <span class="tag" id="scrubTime">0:00</span>
        <span class="lead" style="margin:0;font-size:0.9rem" id="scrubNote">拖动时间轴，硬话跟着切</span>
      </div>
    </div>
