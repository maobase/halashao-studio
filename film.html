<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="哈拉少片源放映厅：showreel 与分镜。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;700;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/hala.css" />
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <div class="led-grid" aria-hidden="true"></div>
  <a class="skip" href="#main">跳到内容</a>
  <header class="shell-nav">
    <a class="logo" href="index.html"><i></i>哈拉少</a>
    <nav class="nav-core" aria-label="主导航">
      <a href="index.html" data-nav>首页</a>
      <a href="work.html" data-nav>作品</a>
      <a href="services.html" data-nav>服务</a>
      <a href="team.html" data-nav>团队</a>
      <a href="process.html" data-nav>流程</a>
      <a href="about.html" data-nav>关于</a>
      <a href="film.html" data-nav class="is-active">片源</a>
      <a href="contact.html" data-nav class="cta">开干</a>
    </nav>
    <button class="burger" id="burger" type="button" aria-label="菜单" aria-expanded="false"><span></span><span></span></button>
  </header>
  <div class="drawer" id="drawer" hidden>
    <nav aria-label="移动导航">
      <a href="index.html" data-close>首页</a>
      <a href="work.html" data-close>作品</a>
      <a href="services.html" data-close>服务</a>
      <a href="team.html" data-close>团队</a>
      <a href="process.html" data-close>流程</a>
      <a href="about.html" data-close>关于</a>
      <a href="film.html" data-close>片源</a>
      <a href="creed.html" data-close>信条</a>
      <a href="lab.html" data-close>实验室</a>
      <a href="vault.html" data-close>库房</a>
      <a href="contact.html" data-close>开干</a>
    </nav>
  </div>

  <main id="main" class="theater">
    <p class="kicker">FILM</p>
    <h1 class="page-h">放映厅</h1>
    <p class="lead">自定义播放器。旁白直出。下面切分镜。</p>

    <div class="player" id="player" style="margin-top:1.5rem">
      <div class="player-stage">
        <video id="filmVid" playsinline preload="metadata" poster="assets/showreel-poster.jpg">
          <source src="assets/showreel.mp4" type="video/mp4" />
        </video>
        <button type="button" class="player-big" id="filmBig" aria-label="播放"></button>
      </div>
      <div class="player-bar">
        <button type="button" id="filmToggle" aria-label="播放暂停">▶</button>
        <div class="scrub" id="scrub"><i id="scrubFill"></i></div>
        <span class="player-time" id="filmTime">0:00 / 0:00</span>
        <button type="button" id="filmMute" aria-label="静音">声</button>
      </div>
    </div>

    <div class="clips">
      <button type="button" class="clip is-on" data-clip="assets/showreel.mp4">
        <img src="assets/showreel-poster.jpg" alt="" />
        <p>主片源 · 旁白</p>
      </button>
      <button type="button" class="clip" data-clip="assets/hero-cinematic.mp4">
        <img src="assets/hero-still.jpg" alt="" />
        <p>电影镜头</p>
      </button>
      <button type="button" class="clip" data-clip="assets/showreel-motion.mp4">
        <img src="assets/work-motion.jpg" alt="" />
        <p>粒子漩涡</p>
      </button>
    </div>
  </main>

  <footer class="foot">
    <p class="foot-mega">FILM</p>
    <div class="foot-row">
      <p>SHOWREEL · 2026</p>
      <div class="foot-links">
        <a href="work.html">作品</a>
        <a href="lab.html">实验室</a>
        <a href="contact.html">开干</a>
      </div>
      <p class="foot-copy">&copy; <span data-year></span> HALASHAO</p>
    </div>
  </footer>
  <script src="js/hala.js"></script>
</body>
</html>
