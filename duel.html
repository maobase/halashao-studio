  <main id="main" class="page">
    <p class="kicker">DUEL · TU VS KU</p>
    <h1 class="page-h">土酷对决<br /><em class="kinetic">点一下</em></h1>
    <p class="lead reveal">连点左侧充土，连点右侧充酷。能量满触发硬话决胜——工作室语法：两边都要，缺一不可。</p>

    <div class="duel-arena" id="duelArena">
      <div class="duel-side tu" id="duelTu" role="button" tabindex="0">
        <p class="kicker seal">TU · 土</p>
        <h2>人间烟火</h2>
        <p>灯牌、字幕、直球、记忆点。土是芯，不是粗糙。</p>
        <div class="duel-meter"><i id="meterTu"></i></div>
        <span class="tag" id="scoreTu">0%</span>
      </div>
      <div class="duel-vs">VS</div>
      <div class="duel-side ku" id="duelKu" role="button" tabindex="0">
        <p class="kicker">KU · 酷</p>
        <h2>系统锋利</h2>
        <p>画幅、层级、节奏、交付。酷是壳，删到站得住。</p>
        <div class="duel-meter"><i id="meterKu"></i></div>
        <span class="tag" id="scoreKu">0%</span>
      </div>
      <div class="duel-flash" id="duelFlash" aria-live="polite"></div>
    </div>

    <div style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.55rem">
      <button type="button" class="btn btn-ghost" id="duelReset">清零再战</button>
      <a class="btn btn-led" href="mix.html">去混剪台</a>
      <a class="btn btn-ghost" href="creed.html">看信条</a>
    </div>

    <div class="band reveal">
      <p>对决不是二选一。叠在一起，才是哈拉少。</p>
      <footer>范德彪 · 酷是壳，土是芯</footer>
    </div>
